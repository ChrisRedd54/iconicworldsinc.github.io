<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iconic Worlds, Inc.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="grain"></canvas>

  <div class="scene">
    <div class="curtain curtain-left"></div>
    <div class="curtain curtain-right"></div>

    <main class="stage">

      <div class="logo-mark">&#9775;</div>

      <div class="rule rule-top"></div>

      <header>
        <h1 class="wordmark">
          <span class="word">Iconic</span>
          <span class="word">Worlds</span>
        </h1>
        <p class="inc">Inc.</p>
      </header>

      <div class="rule rule-mid"></div>

      <p class="descriptor">
        Comedy IP Franchise Architecture<br>
        <em>for Film and Television Studios</em>
      </p>

      <div class="rule rule-thin"></div>

      <p class="founder">
        Christopher <span class="last-name">Redding</span>
        <span class="title-line">Founder &amp; Chief Creative Officer</span>
      </p>

      <div class="rule rule-thin"></div>

      <p class="referral">
        Engagements accepted by referral only.
      </p>

      <div class="rule rule-bottom"></div>

      <footer>
        <p class="footer-text">&copy; 2026 Iconic Worlds, Inc. All rights reserved.</p>
      </footer>

    </main>
  </div>

  <script src="grain.js"></script>
</body>
</html>
